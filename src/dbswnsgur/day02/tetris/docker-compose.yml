services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tetris
      MYSQL_USER: tetris
      MYSQL_PASSWORD: tetris1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://tetris:tetris1234@db:3306/tetris?charset=utf8mb4
      SECRET_KEY: tetris-dev-secret-key-change-in-production
    restart: on-failure

volumes:
  mysql_data:
